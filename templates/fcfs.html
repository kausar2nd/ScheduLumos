<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCFS Scheduling - ScheduLumos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/algorithm_style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

</head>

<body>
    <div class="container">
        <header>
            <h1>FCFS Scheduling</h1>
            <p>First Come First Served Algorithm</p>
        </header>
        <div id="validation-message"></div>

        <button class="btn back-btn" id="back-btn">🡸 Back</button>

        <section class="input-section">
            <h2>Process Input</h2>
            <div class="table-wrapper">
                <table class="process-table">
                    <thead>
                        <tr>
                            <th>PID</th>
                            <th>Arrival Time</th>
                            <th>Burst Time</th>
                            <th class="action-col"></th>
                        </tr>
                    </thead>
                    <tbody id="process-tbody">
                        <tr>
                            <td><input type="text" value="P1" readonly></td>
                            <td><input type="number" min="0" value="0" class="arrival-time"></td>
                            <td><input type="number" min="1" value="1" class="burst-time"></td>
                            <td class="action-col"><button class="remove-btn" disabled> </button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button class="add-row-btn" id="add-process">+ Add Process</button>
        </section>
        <section class="actions">
            <button class="btn btn-primary" id="run-algo">Calculate</button>
            <button class="btn btn-secondary" id="clear-all">Reset</button>
            <button class="btn btn-secondary" id="load-example">Load Example</button>
        </section>
        <section class="results-section" id="output-section"></section>
    </div>

    <footer>
        <p>
            Developed by <strong>KAUS4R</strong>&nbsp; ·
            <a href="https://github.com/kausar2nd/" target="_blank" title="GitHub" class="footer-icon">
                <i class="fab fa-github" aria-hidden="true"></i>
            </a> ·
            <a href="https://www.linkedin.com/in/kausar2nd/" target="_blank" title="LinkedIn" class="footer-icon">
                <i class="fab fa-linkedin" aria-hidden="true"></i>
            </a>
        </p>
    </footer>
    <script src="{{ url_for('static', filename='js/algorithm_common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/fcfs.js') }}"></script>
    <script>
        document.getElementById('back-btn').addEventListener('click', function () {
            window.location.href = "{{ url_for('home') }}";
        });
    </script>
</body>

</html>
